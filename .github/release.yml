changelog:
  exclude:
    labels:
      - question
      - wontfix
      - invalid
  categories:
    - title: Exciting New Features 🎉
      labels:
        - enhancement
        - feature
    - title: Squashed Bugs 🐛
      labels:
        - bug
        - breaking-change
    - title: ICG/Backend
      labels:
        - administrative
        - documentation
        - dependencies
    - title: Other Changes
      labels:
        - "*"
